name: Build App
run-name: ${{ github.event.inputs.os }} | ${{ github.event.inputs.platform }} | ${{ github.event.inputs.profile }} | ${{ github.event.inputs.repo }} | ${{ github.event.inputs.branch }} | ${{ github.event.inputs.artifact }}
on:
  workflow_dispatch:
    inputs:
      os:
        description: OS to build on. Ubuntu is faster, MacOS supports iOS builds, Windows is unsupported
      platform:
        type: choice
        description: Platform to build for
        options:
          - android
          - ios
      profile:
        type: choice
        description: Build profile to use
        options:
          - development
          - simulator
          - preview
          - testflight
          - production
      repo:
        description: 'Repository name'
        required: true
      branch:
        description: 'Branch name'
        default: master

      artifact:
        type: choice
        description: Artifact
        options:
          - none
          - upload
          - submit
          - loadlyio
      key:
        description: Key
        required: true

env:
  GH_MODULE_TOKEN: ${{ secrets.GH_MODULE_TOKEN }}

jobs:
  build:
    runs-on: ${{ github.event.inputs.os }}
    strategy:
      matrix:
        # Upgrade Node.js version to 20.x
        node: [ 20.x ]
    steps:
      - name: Assign variable
        id: secret
        run: echo '::set-output name=secret::${{secrets.KEY}}'

      - name: 🏗 Setup repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: 🏗 Clone code
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret }}
        run: rm -rf ./* && git clone --branch ${{ github.event.inputs.branch }} --single-branch https://${{ secrets.GH_TOKEN }}@github.com/${{ secrets.USER }}/${{ github.event.inputs.repo }}.git

      - name: 🏗 Move code
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret }}
        run: mv ./${{ github.event.inputs.repo }}/* ./

      - name: 🏗 Setup Node
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: 🏗 Setup Expo and EAS
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret }}
        uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          expo-version: latest
          eas-version: latest

      - name: 🏗 Setup EAS local builds
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret }}
        run: yarn global add eas-cli-local-build-plugin

      - name: 🍎 Download iOS Platform (macOS only)
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret && github.event.inputs.platform == 'ios' && runner.os == 'macOS' }}
        run: |
          echo "Downloading iOS platform to fix SDK missing issue..."
          sudo xcode-select --switch /Applications/Xcode_16.4.app
          echo "iOS platform download completed"

      - name: 📦 Install dependencies
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret }}
        run: rm -rf yarn.lock && rm -rf package-lock.json && yarn install && npx expo install --fix

      - name: ☑️ Pre-build script
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret }}
        run: npx -y hd-app-scripts --prebuild

      - name: 🔧 Configure Global Gradle Settings
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret && github.event.inputs.platform == 'android' }}
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx14g -XX:MaxMetaspaceSize=2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.daemon=false
          org.gradle.caching=true
          EOF
          echo "Global Gradle configuration created at ~/.gradle/gradle.properties"
          cat ~/.gradle/gradle.properties

      - name: ⚙ Build app
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret }}
        run: |
          eas build --local \
            --non-interactive \
            --platform=${{ github.event.inputs.platform }} \
            --profile=${{ github.event.inputs.profile }}

      - name: 👀 Find path
        id: find_path
        run: echo "::set-output name=artifact_path::$(echo $(find . -type f -name 'build-*.*' -maxdepth 1))"

      - name: ♨️ Show path
        run: echo ${{ steps.find_path.outputs.artifact_path }}

      - name: 📱 Upload binary
        if: ${{ github.event.inputs.key == steps.secret.outputs.secret }}
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.platform }}
          path: ${{ steps.find_path.outputs.artifact_path }}

      - name: 🕖 Submit app
        if: ${{ contains('submit',github.event.inputs.artifact) && github.event.inputs.key == steps.secret.outputs.secret }}
        run: eas submit -p ${{ github.event.inputs.platform }} --path ${{ steps.find_path.outputs.artifact_path }}

      - name: 📱 Upload File
        id: loadlyio
        if: ${{ contains('loadlyio',github.event.inputs.artifact) && github.event.inputs.key == steps.secret.outputs.secret }}
        uses: hoangdaicntt/telegram-installonair-actions@main
        with:
          messageTitle: '${{ github.event.inputs.repo }}[${{ github.event.inputs.branch }}] ${{ github.event.inputs.platform }} ${{ github.event.inputs.profile }}'
          installonairUserId: '74613'
          telegramUid: ${{ secrets.TELEGRAM_TO }}
          telegramToken: ${{ secrets.TELEGRAM_TOKEN }}
          loadlyIoToken: ${{ secrets.LOADLYIO_TOKEN }}
          filePath: ${{ steps.find_path.outputs.artifact_path }}
          method: 'loadlyio-build'

      - name: 📱 Message Build
        if: ${{ contains('submit',github.event.inputs.artifact) && github.event.inputs.key == steps.secret.outputs.secret }}
        uses: hoangdaicntt/telegram-installonair-actions@main
        with:
          messageTitle: '${{ github.event.inputs.repo }}[${{ github.event.inputs.branch }}] ${{ github.event.inputs.platform }} ${{ github.event.inputs.profile }}'
          installonairUserId: '74613'
          telegramUid: ${{ secrets.TELEGRAM_TO }}
          telegramToken: ${{ secrets.TELEGRAM_TOKEN }}
          loadlyIoToken: ${{ secrets.LOADLYIO_TOKEN }}
          filePath: ${{ steps.find_path.outputs.artifact_path }}
          method: 'send-only'
